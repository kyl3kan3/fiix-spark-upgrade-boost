name: Social Preview Check

# Daily scheduled check that the live site's og:image / og:title /
# og:description match the canonical navy/teal values when fetched with
# Facebook, LinkedIn, and Twitter user-agents. On failure, an issue is
# opened (or refreshed) so the team is alerted that a social cache or a
# deploy regressed the preview metadata.

on:
  schedule:
    # Every day at 13:30 UTC — slightly after the Ahrefs site-audit cron.
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to probe (defaults to production)"
        required: false
        default: "https://maintenease.com"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    env:
      # Job-level so it's set once for every step (used by all three audits) and,
      # for MAIL_SERVER, so it's in scope for the email step's `if` — a step's own
      # `env:` block is NOT available to that same step's `if` condition.
      BASE_URL: ${{ github.event.inputs.base_url || 'https://maintenease.com' }}
      MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install minimal deps
        run: npm install --no-audit --no-fund tsx typescript

      - name: Run page-level og audit
        id: og_audit
        run: npx tsx scripts/check-og-images.ts

      - name: Run social-crawler audit
        id: social_audit
        if: always()
        env:
          # Optional — only set if you've added a Facebook App access token
          # to repo secrets; enables automatic Facebook cache invalidation
          # when mismatches are detected.
          FB_APP_ACCESS_TOKEN: ${{ secrets.FB_APP_ACCESS_TOKEN }}
        run: npx tsx scripts/check-social-cache.ts 2>&1 | tee social-audit.log

      - name: Snapshot metadata history
        id: snapshot
        if: always()
        continue-on-error: true
        run: npx tsx scripts/snapshot-meta-history.ts

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-preview-reports
          path: |
            social-audit.log
            reports/meta-history/latest.json
            reports/meta-history/latest-diff.md
          if-no-files-found: ignore

      # Email notification on failure. Configure these repo/org secrets to enable:
      #   MAIL_SERVER, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM, MAIL_TO
      # The step is skipped automatically when MAIL_SERVER is not configured.
      - name: Email alert on failure
        if: failure() && env.MAIL_SERVER != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: MaintenEase Monitoring <${{ secrets.MAIL_FROM }}>
          to: ${{ secrets.MAIL_TO }}
          subject: "[MaintenEase] Social preview check FAILED"
          body: |
            The daily social-preview audit failed.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Artifacts (social-audit.log + meta-history diff) are attached
            to the workflow run. Re-run the job after caches refresh; if
            it persists, use the platform debuggers:
              • https://developers.facebook.com/tools/debug/
              • https://www.linkedin.com/post-inspector/
              • https://cards-dev.twitter.com/validator
          attachments: social-audit.log,reports/meta-history/latest-diff.md
          ignore_cert: true

      - name: Open alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Social preview check failed";
            const body = [
              "The scheduled social-preview audit detected stale or wrong",
              "metadata served to Facebook / LinkedIn / Twitter crawlers.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Next steps:",
              "1. Re-run the failing job to confirm it isn't a transient fetch.",
              "2. Inspect the live HTML head of the failing URL(s).",
              "3. Force a refresh via the platform debuggers:",
              "   • https://developers.facebook.com/tools/debug/",
              "   • https://www.linkedin.com/post-inspector/",
              "   • https://cards-dev.twitter.com/validator (X retired the API)",
              "",
              "_Auto-generated by `.github/workflows/social-preview-check.yml`._",
            ].join("\n");

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "social-preview-alert",
              per_page: 1,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["social-preview-alert", "seo"],
              });
            }