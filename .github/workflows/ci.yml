name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this job only reads the repo (build + test, no writes).
permissions:
  contents: read

# Cancel superseded PR runs when new commits are pushed, but never cancel a
# main build — each main commit is tagged as a Sentry release via VITE_APP_VERSION.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: build-only-placeholder
      VITE_SUPABASE_PROJECT_ID: example
      # Tag every build with the commit SHA so Sentry can group errors by
      # release and power crash-free-session/user metrics on the Releases
      # dashboard. Read by src/lib/sentry.ts via import.meta.env.
      VITE_APP_VERSION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Responsive-layout ratchet
        run: npm run check:responsive

      - name: Structure check
        run: npm run check:structure

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
